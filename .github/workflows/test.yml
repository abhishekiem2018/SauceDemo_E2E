name: Selenium Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Selenium Tests
        run: mvn clean test

      - name: Upload Extent Report (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: test-output/**